# =============================================
#  應用程式設定
# =============================================
spring.application.name=login-system
server.port=8080

# =============================================
#  資料庫 (H2 開發用)
#  正式環境請改用 MySQL/PostgreSQL
# =============================================
spring.datasource.url=jdbc:h2:mem:logindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
#  JWT 設定
# =============================================
# 請使用至少 256-bit 的 Base64 金鑰 (正式環境存入環境變數)
# 可用指令產生: openssl rand -base64 64
jwt.secret=dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1wcm9kdWN0aW9uLXVzZS1vbmx5LXBsZWFzZS1jaGFuZ2UtbWU=
jwt.access-token-expiration-ms=900000
# Refresh Token 有效期：7 天 (ms)
jwt.refresh-token-expiration-ms=604800000

# =============================================
#  帳號安全設定
# =============================================
# 最大失敗次數後鎖定帳號
security.max-failed-attempts=5
# 帳號鎖定時間 (分鐘)
security.lock-duration-minutes=30

# =============================================
#  Email 設定 (開發模式：使用 console 輸出)
# =============================================
# 開發時設為 true，正式環境設為 false 並填寫 SMTP 資訊
app.email.dev-mode=true
app.base-url=http://localhost:8080

# 正式環境 SMTP 設定 (需關閉 dev-mode)
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# Email 驗證 Token 有效期 (分鐘)
app.email-verification-expiry-minutes=1440
# 密碼重設 Token 有效期 (分鐘)
app.password-reset-expiry-minutes=60